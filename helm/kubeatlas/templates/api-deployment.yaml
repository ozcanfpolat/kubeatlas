apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeatlas.fullname" . }}-api
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "kubeatlas.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        # Force redeployment on config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kubeatlas.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      serviceAccountName: {{ include "kubeatlas.serviceAccountName" . }}
      
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      
      # Init container to wait for database migration
      initContainers:
        - name: wait-for-migration
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for database migration to complete..."
              # Wait for migration job to complete
              until [ -f /tmp/migration-complete ]; do
                sleep 2
              done
              echo "Migration complete!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      containers:
        - name: api
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          # Environment variables
          env:
            # Server configuration
            - name: SERVER_MODE
              value: {{ .Values.api.env.SERVER_MODE | quote }}
            - name: SERVER_PORT
              value: {{ .Values.api.env.SERVER_PORT | quote }}
            
            # Logging
            - name: LOG_LEVEL
              value: {{ .Values.api.env.LOG_LEVEL | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.api.env.LOG_FORMAT | quote }}
            
            # Database configuration from secret
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-db
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-db
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-db
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-db
                  key: database
            - name: DB_SSLMODE
              value: {{ .Values.api.env.DB_SSLMODE | quote }}
            - name: DB_MAX_CONNS
              value: {{ .Values.api.env.DB_MAX_CONNS | quote }}
            
            # JWT configuration from secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-jwt
                  key: secret
            - name: JWT_EXPIRATION_HOURS
              value: {{ .Values.api.env.JWT_EXPIRATION_HOURS | quote }}
            - name: JWT_REFRESH_HOURS
              value: {{ .Values.api.env.JWT_REFRESH_HOURS | quote }}
            
            # Encryption key for sensitive data (kubeconfig, tokens, CA certs)
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-encryption
                  key: key
            
            # CORS origins
            - name: CORS_ORIGINS
              value: {{ printf "https://%s" .Values.global.domain | quote }}
            
            # Storage configuration
            - name: STORAGE_TYPE
              value: {{ .Values.api.env.STORAGE_TYPE | quote }}
            - name: STORAGE_LOCAL_PATH
              value: {{ .Values.api.env.STORAGE_LOCAL_PATH | quote }}
            
            # Redis configuration (if enabled)
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-redis
                  key: host
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeatlas.fullname" . }}-redis
                  key: password
            {{- end }}
            
            # Extra environment variables
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          
          # Health checks
          {{- if .Values.api.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.httpGet.path }}
              port: {{ .Values.api.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          {{- end }}
          
          {{- if .Values.api.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.httpGet.path }}
              port: {{ .Values.api.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          {{- end }}
          
          {{- if .Values.api.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.startupProbe.httpGet.path }}
              port: {{ .Values.api.startupProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.api.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
          {{- end }}
          
          # Resource limits
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          
          # Volume mounts
          volumeMounts:
            # Temporary directory for the application
            - name: tmp
              mountPath: /tmp
            # Persistent storage for uploads
            - name: data
              mountPath: {{ .Values.api.env.STORAGE_LOCAL_PATH }}
            # Read-only root filesystem workaround
            - name: cache
              mountPath: /app/cache
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 100Mi
        - name: data
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kubeatlas.fullname" . }}-api-data
          {{- else }}
          emptyDir:
            sizeLimit: 10Gi
          {{- end }}
      
      # Scheduling
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      # Topology spread for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kubeatlas.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "kubeatlas.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api

---
# Persistent Volume Claim for API data (if persistence enabled)
{{- if .Values.api.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kubeatlas.fullname" . }}-api-data
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  accessModes:
    - {{ .Values.api.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.api.persistence.size }}
  {{- if .Values.api.persistence.storageClass }}
  storageClassName: {{ .Values.api.persistence.storageClass }}
  {{- end }}
{{- end }}
