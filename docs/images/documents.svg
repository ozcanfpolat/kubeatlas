  <text x="490" y="633" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Confluence</text>
  <text x="750" y="595" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Security Team</text>
  <text x="750" y="615" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">External Link</text>
  <text x="980" y="600" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">2 weeks ago</text>
  <text x="1080" y="600" fill="#64748b" font-family="system-ui, sans-serif" font-size="18">⋮</text>

