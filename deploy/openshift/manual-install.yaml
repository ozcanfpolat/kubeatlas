# ============================================
# KubeAtlas OpenShift Manuel Kurulum
# ============================================
# Bu dosyayı bölüm bölüm uygulayın:
# oc apply -f manual-install.yaml
# ============================================

---
# ============================================
# 0. PERSISTENT VOLUME CLAIM (Döküman Depolama)
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeatlas-uploads
  labels:
    app: kubeatlas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ============================================
# 1. API DEPLOYMENT
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeatlas-api
  labels:
    app: kubeatlas
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeatlas
      component: api
  template:
    metadata:
      labels:
        app: kubeatlas
        component: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/ozcanfpolat/kubeatlas-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: GIN_MODE
              value: "release"
            - name: SERVER_PORT
              value: "8080"
            - name: DB_HOST
              value: "kubeatlas-db-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "kubeatlas"
            - name: DB_NAME
              value: "kubeatlas"
            - name: DB_SSLMODE
              value: "disable"
            - name: STORAGE_LOCAL_PATH
              value: "/app/data/uploads"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeatlas-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubeatlas-secrets
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeatlas-secrets
                  key: ENCRYPTION_KEY
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: kubeatlas-uploads

---
# ============================================
# 2. API SERVICE
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: kubeatlas-api
  labels:
    app: kubeatlas
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kubeatlas
    component: api

---
# ============================================
# 3. UI DEPLOYMENT
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeatlas-ui
  labels:
    app: kubeatlas
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeatlas
      component: ui
  template:
    metadata:
      labels:
        app: kubeatlas
        component: ui
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ui
          image: ghcr.io/ozcanfpolat/kubeatlas-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ============================================
# 4. UI SERVICE
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: kubeatlas-ui
  labels:
    app: kubeatlas
    component: ui
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kubeatlas
    component: ui

---
# ============================================
# 5. ROUTE (OpenShift)
# ============================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kubeatlas
  labels:
    app: kubeatlas
spec:
  to:
    kind: Service
    name: kubeatlas-ui
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

# Note: API route removed - all traffic goes through UI nginx proxy
# Frontend calls /api/* which nginx proxies to kubeatlas-api service
