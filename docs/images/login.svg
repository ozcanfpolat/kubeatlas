<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Decorative Elements -->
  <circle cx="200" cy="200" r="150" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1000" cy="600" r="200" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="100" cy="700" r="100" fill="#22c55e" opacity="0.1"/>
  
  <!-- Logo -->
  <text x="600" y="120" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" text-anchor="middle">☸️</text>
  <text x="600" y="170" fill="white" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" text-anchor="middle">KubeAtlas</text>
  <text x="600" y="200" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">Central Kubernetes Inventory & Ownership Platform</text>

  <!-- Login Card -->
  <rect x="400" y="250" width="400" height="420" rx="16" fill="white" filter="url(#shadow)"/>
  
  <!-- Card Header -->
  <text x="600" y="300" fill="#1e293b" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Welcome Back</text>
  <text x="600" y="325" fill="#64748b" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">Sign in to your account to continue</text>
  
  <!-- Email Field -->
  <text x="430" y="370" fill="#374151" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Email</text>
  <rect x="430" y="380" width="340" height="48" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="445" y="410" fill="#6b7280" font-family="system-ui, sans-serif" font-size="14">admin@kubeatlas.local</text>
  
  <!-- Password Field -->
  <text x="430" y="450" fill="#374151" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Password</text>
  <rect x="430" y="460" width="340" height="48" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="445" y="490" fill="#6b7280" font-family="system-ui, sans-serif" font-size="14">••••••••••••</text>
  <text x="745" y="490" fill="#6b7280" font-family="system-ui, sans-serif" font-size="14">👁</text>
  
  <!-- Remember and Forgot -->
  <rect x="430" y="520" width="18" height="18" rx="4" fill="#3b82f6"/>
  <text x="438" y="534" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">✓</text>
  <text x="455" y="534" fill="#374151" font-family="system-ui, sans-serif" font-size="14">Remember me</text>
  <text x="715" y="534" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="14">Forgot password?</text>
  
  <!-- Sign In Button -->
  <rect x="430" y="560" width="340" height="48" rx="8" fill="#3b82f6"/>
  <text x="600" y="590" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Sign In</text>
  
  <!-- Divider -->
  <line x1="430" y1="640" x2="600" y2="640" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="645" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">OR</text>
  <line x1="600" y1="640" x2="770" y2="640" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- SSO Buttons -->
  <rect x="430" y="665" width="165" height="42" rx="8" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="512" y="692" fill="#374151" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">🔐 LDAP</text>
  
  <rect x="605" y="665" width="165" height="42" rx="8" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="687" y="692" fill="#374151" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">🔑 SSO</text>
</svg>