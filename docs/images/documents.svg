  <rect x="425" y="515" width="60" height="20" rx="4" fill="#f3f4f6"/>
  <text x="455" y="528" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">PDF</text>
  <text x="750" y="490" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Product Team</text>
  <text x="750" y="510" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">1.2 MB</text>
  <text x="980" y="495" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">1 week ago</text>
  <text x="1080" y="495" fill="#64748b" font-family="system-ui, sans-serif" font-size="18">⋮</text>
  
  <!-- Document Item 4 -->
  <rect x="290" y="555" width="845" height="90" rx="8" fill="white"/>
  <rect x="305" y="570" width="45" height="45" rx="6" fill="#d1fae5"/>
  <text x="327" y="600" fill="#059669" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">🔐</text>
  <text x="365" y="590" fill="#1e293b" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Security Policy - Data Classification</text>
