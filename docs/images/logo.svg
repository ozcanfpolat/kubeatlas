<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326CE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad1)"/>
  
  <!-- Kubernetes wheel (simplified) -->
  <g transform="translate(60,60)">
    <!-- Center hexagon -->
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="white" opacity="0.9"/>
    
    <!-- Spokes -->
    <g stroke="white" stroke-width="4" fill="none" opacity="0.9">
      <line x1="0" y1="-22" x2="0" y2="-38"/>
      <line x1="19" y1="11" x2="33" y2="19"/>
      <line x1="-19" y1="11" x2="-33" y2="19"/>
      <line x1="19" y1="-11" x2="33" y2="-19"/>
      <line x1="-19" y1="-11" x2="-33" y2="-19"/>
      <line x1="0" y1="22" x2="0" y2="38"/>
    </g>
    
    <!-- Outer dots -->
    <g fill="white" opacity="0.9">
      <circle cx="0" cy="-42" r="5"/>
      <circle cx="36" cy="21" r="5"/>
      <circle cx="-36" cy="21" r="5"/>
      <circle cx="36" cy="-21" r="5"/>
      <circle cx="-36" cy="-21" r="5"/>
      <circle cx="0" cy="42" r="5"/>
    </g>
  </g>
  
  <!-- Atlas ring -->
  <ellipse cx="60" cy="60" rx="50" ry="18" fill="none" stroke="white" stroke-width="3" opacity="0.6" transform="rotate(-25,60,60)"/>
</svg>
