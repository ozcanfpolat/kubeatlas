# ============================================
# KubeAtlas Docker Compose
# ============================================
# Quick Start:
#   cp .env.example .env
#   docker-compose up -d
#
# With PostgreSQL:
#   docker-compose --profile with-db up -d
#
# Production (external DB):
#   docker-compose up -d
# ============================================

services:
  # ============================================
  # Backend API (Go)
  # ============================================
  kubeatlas-api:
    image: ghcr.io/ozcanfpolat/kubeatlas-api:${VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kubeatlas-api
    restart: unless-stopped
    environment:
      # Server
      GIN_MODE: ${GIN_MODE:-release}
      SERVER_PORT: "8080"
      
      # Database (required)
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-kubeatlas}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_NAME: ${DB_NAME:-kubeatlas}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      
      # Security (required)
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Encryption key required}
      
      # Storage
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/data/uploads
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - kubeatlas-uploads:/app/data/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kubeatlas-network
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # ============================================
  # Frontend (React + Nginx)
  # ============================================
  kubeatlas-ui:
    image: ghcr.io/ozcanfpolat/kubeatlas-ui:${VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kubeatlas-ui
    restart: unless-stopped
    environment:
      # Backend service name for nginx proxy
      BACKEND_HOST: kubeatlas-api
    ports:
      - "${UI_PORT:-80}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kubeatlas-network
    depends_on:
      kubeatlas-api:
        condition: service_healthy

  # ============================================
  # PostgreSQL (Optional - use profile)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: kubeatlas-postgres
    restart: unless-stopped
    profiles:
      - with-db
    environment:
      POSTGRES_USER: ${DB_USER:-kubeatlas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_DB: ${DB_NAME:-kubeatlas}
    volumes:
      - kubeatlas-postgres:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kubeatlas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kubeatlas-network

# ============================================
# Networks
# ============================================
networks:
  kubeatlas-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  kubeatlas-uploads:
    driver: local
  kubeatlas-postgres:
    driver: local
