{{/*
Generate secrets for KubeAtlas
*/}}

---
# JWT Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-jwt
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
  annotations:
    # Rotate this secret manually or use external secret management
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: Opaque
data:
  {{- if .Values.auth.jwt.secret }}
  secret: {{ .Values.auth.jwt.secret | b64enc | quote }}
  {{- else }}
  # Generate a random secret if not provided
  # WARNING: This will change on every helm upgrade unless you provide a fixed value
  secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}

---
# Encryption Key Secret (for encrypting kubeconfig, tokens, CA certs)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-encryption
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: Opaque
data:
  {{- if .Values.encryption.key }}
  key: {{ .Values.encryption.key | b64enc | quote }}
  {{- else }}
  # Generate a random key if not provided
  # WARNING: This will change on every helm upgrade unless you provide a fixed value
  # If this changes, existing encrypted data will become unreadable!
  key: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}

---
# Database Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-db
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgresql.enabled }}
  # Use values from embedded PostgreSQL
  host: {{ printf "%s-postgresql" (include "kubeatlas.fullname" .) | b64enc | quote }}
  port: {{ "5432" | b64enc | quote }}
  database: {{ .Values.postgresql.auth.database | b64enc | quote }}
  username: {{ .Values.postgresql.auth.username | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- else if .Values.externalDatabase.existingSecret }}
  # Use external secret - these will be referenced but not stored here
  {{- else }}
  # Use external database values
  host: {{ .Values.externalDatabase.host | b64enc | quote }}
  port: {{ .Values.externalDatabase.port | toString | b64enc | quote }}
  database: {{ .Values.externalDatabase.database | b64enc | quote }}
  username: {{ .Values.externalDatabase.username | b64enc | quote }}
  password: {{ .Values.externalDatabase.password | b64enc | quote }}
  {{- end }}
  # Connection string for applications that need it
  {{- if .Values.postgresql.enabled }}
  uri: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s?sslmode=%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "kubeatlas.fullname" .) .Values.postgresql.auth.database .Values.externalDatabase.sslMode | b64enc | quote }}
  {{- else }}
  uri: {{ printf "postgresql://%s:%s@%s:%d/%s?sslmode=%s" .Values.externalDatabase.username .Values.externalDatabase.password .Values.externalDatabase.host (.Values.externalDatabase.port | int) .Values.externalDatabase.database .Values.externalDatabase.sslMode | b64enc | quote }}
  {{- end }}

---
# LDAP Secret (if enabled)
{{- if .Values.auth.ldap.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-ldap
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  bindPassword: {{ .Values.auth.ldap.bindPassword | b64enc | quote }}
{{- end }}

---
# OIDC Secret (if enabled)
{{- if .Values.auth.oidc.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-oidc
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  clientSecret: {{ .Values.auth.oidc.clientSecret | b64enc | quote }}
{{- end }}

---
# S3 Storage Secret (if using S3)
{{- if eq .Values.storage.type "s3" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-storage
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  accessKey: {{ .Values.storage.s3.accessKey | b64enc | quote }}
  secretKey: {{ .Values.storage.s3.secretKey | b64enc | quote }}
{{- end }}

---
# Azure Storage Secret (if using Azure)
{{- if eq .Values.storage.type "azure" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-storage
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  accountKey: {{ .Values.storage.azure.accountKey | b64enc | quote }}
{{- end }}

---
# GCS Storage Secret (if using GCS)
{{- if eq .Values.storage.type "gcs" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-storage
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  key.json: {{ .Values.storage.gcs.serviceAccountKey | b64enc | quote }}
{{- end }}

---
# Redis Secret (if using external Redis)
{{- if and .Values.redis.enabled .Values.redis.auth.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeatlas.fullname" . }}-redis
  labels:
    {{- include "kubeatlas.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.redis.auth.password | b64enc | quote }}
{{- end }}