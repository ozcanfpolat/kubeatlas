<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f1f5f9"/>

  <!-- Top Navigation -->
  <rect width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="30" y="38" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold">☸️ KubeAtlas</text>
  
  <!-- Nav Items -->
  <text x="350" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Dashboard</text>
  <text x="450" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Clusters</text>
  <text x="540" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Namespaces</text>
  <text x="650" y="38" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Dependencies</text>
  <text x="770" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Documents</text>
  <text x="870" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Teams</text>
  
  <!-- User Avatar -->
  <circle cx="1150" cy="30" r="18" fill="#3b82f6"/>
  <text x="1150" y="35" fill="white" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">👤</text>

  <!-- Sidebar -->
  <rect x="0" y="60" width="240" height="740" fill="white"/>
  <text x="45" y="105" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📊 Dashboard</text>
  <text x="45" y="150" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">🖥️ Clusters</text>
  <text x="45" y="195" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📦 Namespaces</text>
  
  <rect x="15" y="220" width="210" height="40" rx="6" fill="#eff6ff"/>
  <text x="45" y="245" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">🔗 Dependencies</text>
  
  <text x="45" y="285" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📄 Documents</text>

  <!-- Main Content -->
  <text x="270" y="100" fill="#1e293b" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">Dependencies</text>
  <text x="270" y="125" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Visualize relationships between namespaces</text>

  <!-- Dependency Graph Container -->
  <rect x="270" y="150" width="885" height="600" rx="10" fill="white" filter="url(#shadow)"/>
  
  <!-- Graph Title -->
  <text x="300" y="185" fill="#1e293b" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Service Dependency Graph</text>
  
  <!-- Legend -->
  <rect x="950" y="165" width="180" height="120" rx="6" fill="#f8fafc"/>
  <text x="965" y="185" fill="#374151" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Legend</text>
  <line x1="965" y1="210" x2="1020" y2="210" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="1030" y="215" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">HTTP/API</text>
  <line x1="965" y1="235" x2="1020" y2="235" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="1030" y="240" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Database</text>
  <line x1="965" y1="260" x2="1020" y2="260" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="1030" y="265" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Message Queue</text>

  <!-- Dependency Nodes -->
  <!-- API Gateway -->
  <rect x="600" y="200" width="140" height="50" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="670" y="220" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">API Gateway</text>
  <text x="670" y="238" fill="#dbeafe" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">nginx-ingress</text>
  
  <!-- Auth Service -->
  <rect x="400" y="320" width="130" height="50" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="465" y="340" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Auth Service</text>
  <text x="465" y="358" fill="#d1fae5" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Keycloak</text>
  
  <!-- User Service -->
  <rect x="600" y="320" width="130" height="50" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="665" y="340" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">User Service</text>
  <text x="665" y="358" fill="#d1fae5" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Node.js</text>
  
  <!-- Order Service -->
  <rect x="800" y="320" width="130" height="50" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="865" y="340" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Order Service</text>
  <text x="865" y="358" fill="#d1fae5" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Java</text>
  
  <!-- Payment Service -->
  <rect x="500" y="440" width="130" height="50" rx="8" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="565" y="460" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Payment</text>
  <text x="565" y="478" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Stripe API</text>
  
  <!-- Notification -->
  <rect x="700" y="440" width="130" height="50" rx="8" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="765" y="460" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Notification</text>
  <text x="765" y="478" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Email/SMS</text>
  
  <!-- Redis Cache -->
  <rect x="400" y="560" width="120" height="50" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="460" y="580" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Redis</text>
  <text x="460" y="598" fill="#ede9fe" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Cache</text>
  
  <!-- PostgreSQL -->
  <rect x="600" y="560" width="120" height="50" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="660" y="580" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">PostgreSQL</text>
  <text x="660" y="598" fill="#ede9fe" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Primary</text>
  
  <!-- RabbitMQ -->
  <rect x="800" y="560" width="120" height="50" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="860" y="580" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">RabbitMQ</text>
  <text x="860" y="598" fill="#ede9fe" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Queue</text>

  <!-- Connections -->
  <!-- API Gateway to Services -->
  <line x1="640" y1="250" x2="465" y2="320" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="670" y1="250" x2="665" y2="320" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="250" x2="865" y2="320" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Services to External -->
  <line x1="530" y1="370" x2="565" y2="440" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrowhead)"/>
  <line x1="865" y1="370" x2="765" y2="440" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrowhead)"/>
  
  <!-- Services to Data -->
  <line x1="465" y1="370" x2="460" y2="560" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="665" y1="370" x2="660" y2="560" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="865" y1="370" x2="860" y2="560" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Selected Node Info -->
  <rect x="270" y="650" width="885" height="80" rx="8" fill="#eff6ff"/>
  <text x="290" y="675" fill="#1e40af" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Selected: payment-service</text>
  <text x="290" y="695" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12">Dependencies: user-auth (API), PostgreSQL (DB), Redis (Cache)</text>
  <text x="290" y="715" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12">Used by: order-service, notification-service</text>
</svg>