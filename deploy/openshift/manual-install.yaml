# ============================================
# KubeAtlas OpenShift Manual Installation
# ============================================
#
# Prerequisites:
#   1. OpenShift cluster access
#   2. PostgreSQL database (install separately or use Bitnami Helm chart)
#   3. GitHub Container Registry secret
#
# Installation Steps:
#   1. Create namespace:
#      oc new-project kubeatlas
#
#   2. Create GitHub registry secret:
#      oc create secret docker-registry ghcr-secret \
#        --docker-server=ghcr.io \
#        --docker-username=YOUR_GITHUB_USERNAME \
#        --docker-password=YOUR_GITHUB_TOKEN
#
#   3. Create secrets:
#      oc create secret generic kubeatlas-secrets \
#        --from-literal=DB_PASSWORD='your_db_password' \
#        --from-literal=JWT_SECRET=$(openssl rand -base64 32) \
#        --from-literal=ENCRYPTION_KEY=$(openssl rand -hex 32)
#
#   4. Deploy:
#      oc apply -f manual-install.yaml
#
#   5. Get route URL:
#      oc get route kubeatlas -o jsonpath='{.spec.host}'
#
# ============================================

---
# ============================================
# 1. PERSISTENT VOLUME CLAIM (Document Storage)
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubeatlas-uploads
  labels:
    app: kubeatlas
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ============================================
# 2. API DEPLOYMENT
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeatlas-api
  labels:
    app: kubeatlas
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeatlas
      component: api
  template:
    metadata:
      labels:
        app: kubeatlas
        component: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/ozcanfpolat/kubeatlas-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: GIN_MODE
              value: "release"
            - name: SERVER_PORT
              value: "8080"
            # Database
            - name: DB_HOST
              value: "kubeatlas-db-postgresql"  # Adjust to your PostgreSQL service name
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "kubeatlas"
            - name: DB_NAME
              value: "kubeatlas"
            - name: DB_SSLMODE
              value: "disable"
            # Storage
            - name: STORAGE_TYPE
              value: "local"
            - name: STORAGE_LOCAL_PATH
              value: "/app/data/uploads"
            # Secrets from Secret resource
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeatlas-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubeatlas-secrets
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeatlas-secrets
                  key: ENCRYPTION_KEY
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: kubeatlas-uploads

---
# ============================================
# 3. API SERVICE
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: kubeatlas-api
  labels:
    app: kubeatlas
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kubeatlas
    component: api

---
# ============================================
# 4. UI DEPLOYMENT
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeatlas-ui
  labels:
    app: kubeatlas
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeatlas
      component: ui
  template:
    metadata:
      labels:
        app: kubeatlas
        component: ui
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ui
          image: ghcr.io/ozcanfpolat/kubeatlas-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            # Backend service name for nginx proxy
            - name: BACKEND_HOST
              value: "kubeatlas-api"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL

---
# ============================================
# 5. UI SERVICE
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: kubeatlas-ui
  labels:
    app: kubeatlas
    component: ui
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kubeatlas
    component: ui

---
# ============================================
# 6. ROUTE (OpenShift)
# ============================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kubeatlas
  labels:
    app: kubeatlas
spec:
  # Uncomment and set your custom hostname:
  # host: kubeatlas.apps.your-cluster.example.com
  to:
    kind: Service
    name: kubeatlas-ui
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

# ============================================
# Notes:
# ============================================
# - All traffic goes through kubeatlas-ui nginx
# - Nginx proxies /api/* to kubeatlas-api:8080/api/v1/*
# - PostgreSQL should be installed separately:
#
#   helm install kubeatlas-db bitnami/postgresql \
#     --set auth.username=kubeatlas \
#     --set auth.password=YOUR_PASSWORD \
#     --set auth.database=kubeatlas \
#     --set primary.persistence.size=10Gi
#
# - Default login: admin@kubeatlas.local / admin123
# ============================================
