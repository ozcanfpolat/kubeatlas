  <text x="710" y="440" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Engineering</text>
  <text x="870" y="440" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">ENG-003</text>
  <text x="1010" y="440" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
