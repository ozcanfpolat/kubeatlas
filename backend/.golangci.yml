# KubeAtlas Go Linting Configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  skip-dirs:
    - vendor
    - third_party
  skip-files:
    - ".*_test.go"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    check-shadowing: false

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/kubeatlas/kubeatlas

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 100

  funlen:
    lines: 150
    statements: 80

  lll:
    line-length: 160

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    for-loops: true

  revive:
    ignore-generated-header: true
    severity: warning

  stylecheck:
    go: "1.21"

  unparam:
    check-exported: false

linters:
  disable-all: true
  enable:
    # Core linters only - for CI stability
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports

issues:
  exclude-rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - errcheck
        - gosec

  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
