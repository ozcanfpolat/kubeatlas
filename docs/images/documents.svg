  <text x="45" y="105" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📊 Dashboard</text>
  <text x="45" y="150" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">🖥️ Clusters</text>
  <text x="45" y="195" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📦 Namespaces</text>
  <text x="45" y="240" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">🔗 Dependencies</text>
  
  <rect x="15" y="260" width="210" height="40" rx="6" fill="#eff6ff"/>
