<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f1f5f9"/>

  <!-- Top Navigation -->
  <rect width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="30" y="38" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold">☸️ KubeAtlas</text>
  
  <!-- Nav Items -->
  <text x="350" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Dashboard</text>
  <text x="450" y="38" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Clusters</text>
  <text x="540" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Namespaces</text>
  <text x="650" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Dependencies</text>
  <text x="770" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Documents</text>
  <text x="870" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Teams</text>
  <text x="940" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Settings</text>
  
  <!-- User Avatar -->
  <circle cx="1150" cy="30" r="18" fill="#3b82f6"/>
  <text x="1150" y="35" fill="white" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">👤</text>

  <!-- Sidebar -->
  <rect x="0" y="60" width="240" height="740" fill="white"/>
  
  <!-- Sidebar Menu -->
  <text x="45" y="105" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📊 Dashboard</text>
  
  <rect x="15" y="125" width="210" height="40" rx="6" fill="#eff6ff"/>
  <text x="45" y="150" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">🖥️ Clusters</text>
  
  <text x="45" y="190" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📦 Namespaces</text>
  <text x="45" y="230" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">🔗 Dependencies</text>
  <text x="45" y="270" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📄 Documents</text>
  <text x="45" y="310" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">👥 Teams</text>

  <!-- Main Content -->
  <text x="270" y="100" fill="#1e293b" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">Clusters</text>
  <text x="270" y="125" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Manage your Kubernetes clusters</text>
  
  <!-- Add Cluster Button -->
  <rect x="1020" y="85" width="135" height="40" rx="6" fill="#3b82f6"/>
  <text x="1087" y="110" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">➕ Add Cluster</text>

  <!-- Filters -->
  <rect x="270" y="150" width="280" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="290" y="178" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">🔍 Search clusters...</text>
  
  <rect x="565" y="150" width="150" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="585" y="178" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Status ▼</text>
  
  <rect x="730" y="150" width="180" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="750" y="178" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Environment ▼</text>

  <!-- Data Table -->
  <rect x="270" y="220" width="885" height="500" rx="10" fill="white" filter="url(#shadow)"/>
  
  <!-- Table Header -->
  <rect x="270" y="220" width="885" height="50" rx="10" fill="#f8fafc"/>
  <text x="295" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Name</text>
  <text x="450" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Environment</text>
  <text x="600" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Status</text>
  <text x="720" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Namespaces</text>
  <text x="850" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Last Sync</text>
  <text x="1000" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Actions</text>
  
  <!-- Row 1 -->
  <rect x="270" y="270" width="885" height="60" fill="white"/>
  <text x="295" y="305" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">production-eks</text>
  <rect x="450" y="285" width="90" height="28" rx="4" fill="#dbeafe"/>
  <text x="495" y="303" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Production</text>
  <circle cx="615" cy="299" r="6" fill="#22c55e"/>
  <text x="630" y="303" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Active</text>
  <text x="735" y="303" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14">45</text>
  <text x="850" y="303" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">2 minutes ago</text>
  <text x="1000" y="303" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 2 -->
  <rect x="270" y="330" width="885" height="60" fill="#f8fafc"/>
  <text x="295" y="365" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">staging-gke</text>
  <rect x="450" y="345" width="70" height="28" rx="4" fill="#d1fae5"/>
  <text x="485" y="363" fill="#065f46" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Staging</text>
  <circle cx="615" cy="359" r="6" fill="#22c55e"/>
  <text x="630" y="363" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Active</text>
  <text x="735" y="363" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14">28</text>
  <text x="850" y="363" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">5 minutes ago</text>
  <text x="1000" y="363" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 3 -->
  <rect x="270" y="390" width="885" height="60" fill="white"/>
  <text x="295" y="425" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">dev-aks</text>
  <rect x="450" y="405" width="95" height="28" rx="4" fill="#fef3c7"/>
  <text x="497" y="423" fill="#92400e" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Development</text>
  <circle cx="615" cy="419" r="6" fill="#22c55e"/>
  <text x="630" y="423" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Active</text>
  <text x="735" y="423" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14">67</text>
  <text x="850" y="423" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">1 hour ago</text>
  <text x="1000" y="423" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 4 -->
  <rect x="270" y="450" width="885" height="60" fill="#f8fafc"/>
  <text x="295" y="485" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">test-openshift</text>
  <rect x="450" y="465" width="50" height="28" rx="4" fill="#e0e7ff"/>
  <text x="475" y="483" fill="#3730a3" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Test</text>
  <circle cx="615" cy="479" r="6" fill="#f59e0b"/>
  <text x="630" y="483" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Syncing</text>
  <text x="735" y="483" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14">16</text>
  <text x="850" y="483" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="13">In progress</text>
  <text x="1000" y="483" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 5 -->
  <rect x="270" y="510" width="885" height="60" fill="white"/>
  <text x="295" y="545" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">legacy-cluster</text>
  <rect x="450" y="525" width="90" height="28" rx="4" fill="#dbeafe"/>
  <text x="495" y="543" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Production</text>
  <circle cx="615" cy="539" r="6" fill="#ef4444"/>
  <text x="630" y="543" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Inactive</text>
  <text x="735" y="543" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14">0</text>
  <text x="850" y="543" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13">3 days ago</text>
  <text x="1000" y="543" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>

  <!-- Pagination -->
  <text x="270" y="760" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Showing 5 of 12 clusters</text>
  <text x="960" y="760" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">←  1  2  3  →</text>
</svg>