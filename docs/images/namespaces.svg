<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f1f5f9"/>

  <!-- Top Navigation -->
  <rect width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="30" y="38" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold">☸️ KubeAtlas</text>
  
  <!-- Nav Items -->
  <text x="350" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Dashboard</text>
  <text x="450" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Clusters</text>
  <text x="540" y="38" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Namespaces</text>
  <text x="650" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Dependencies</text>
  <text x="770" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Documents</text>
  <text x="870" y="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Teams</text>
  
  <!-- User Avatar -->
  <circle cx="1150" cy="30" r="18" fill="#3b82f6"/>
  <text x="1150" y="35" fill="white" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">👤</text>

  <!-- Sidebar -->
  <rect x="0" y="60" width="240" height="740" fill="white"/>
  <text x="45" y="105" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📊 Dashboard</text>
  <text x="45" y="150" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">🖥️ Clusters</text>
  
  <rect x="15" y="170" width="210" height="40" rx="6" fill="#eff6ff"/>
  <text x="45" y="195" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">📦 Namespaces</text>
  
  <text x="45" y="235" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">🔗 Dependencies</text>
  <text x="45" y="275" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">📄 Documents</text>

  <!-- Main Content -->
  <text x="270" y="100" fill="#1e293b" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">Namespaces</text>
  <text x="270" y="125" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">156 namespaces across all clusters</text>
  
  <!-- Export Button -->
  <rect x="1075" y="85" width="80" height="40" rx="6" fill="white" stroke="#e2e8f0"/>
  <text x="1115" y="110" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">📥 Export</text>

  <!-- Filters -->
  <rect x="270" y="150" width="200" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="290" y="178" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">🔍 Search</text>
  
  <rect x="485" y="150" width="140" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="505" y="178" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Cluster ▼</text>
  
  <rect x="640" y="150" width="140" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="660" y="178" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Environment ▼</text>
  
  <rect x="795" y="150" width="130" height="45" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="815" y="178" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Criticality ▼</text>
  
  <rect x="940" y="150" width="120" height="45" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="960" y="178" fill="#dc2626" font-family="system-ui, sans-serif" font-size="14">☑ Orphaned</text>

  <!-- Data Table -->
  <rect x="270" y="220" width="885" height="530" rx="10" fill="white" filter="url(#shadow)"/>
  
  <!-- Table Header -->
  <rect x="270" y="220" width="885" height="50" rx="10" fill="#f8fafc"/>
  <text x="295" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Namespace</text>
  <text x="430" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Cluster</text>
  <text x="560" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Environment</text>
  <text x="690" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Owner</text>
  <text x="810" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Criticality</text>
  <text x="1000" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Actions</text>
  
  <!-- Row 1 -->
  <rect x="270" y="270" width="885" height="55" fill="white"/>
  <text x="295" y="302" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">payment-service</text>
  <text x="430" y="302" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">production-eks</text>
  <rect x="560" y="285" width="90" height="28" rx="4" fill="#dbeafe"/>
  <text x="605" y="303" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Production</text>
  <text x="690" y="302" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Platform Team</text>
  <rect x="810" y="285" width="70" height="28" rx="4" fill="#fef2f2"/>
  <text x="845" y="303" fill="#991b1b" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Critical</text>
  <text x="1000" y="302" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 2 -->
  <rect x="270" y="325" width="885" height="55" fill="#f8fafc"/>
  <text x="295" y="357" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">user-auth</text>
  <text x="430" y="357" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">production-eks</text>
  <rect x="560" y="340" width="90" height="28" rx="4" fill="#dbeafe"/>
  <text x="605" y="358" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Production</text>
  <text x="690" y="357" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Security Team</text>
  <rect x="810" y="340" width="70" height="28" rx="4" fill="#fef2f2"/>
  <text x="845" y="358" fill="#991b1b" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Critical</text>
  <text x="1000" y="357" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 3 - Orphaned -->
  <rect x="270" y="380" width="885" height="55" fill="#fffbeb"/>
  <text x="295" y="412" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">⚠️ untracked-api</text>
  <text x="430" y="412" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">production-eks</text>
  <rect x="560" y="395" width="90" height="28" rx="4" fill="#dbeafe"/>
  <text x="605" y="413" fill="#1e40af" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Production</text>
  <text x="690" y="412" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13">— Unassigned</text>
  <rect x="810" y="395" width="70" height="28" rx="4" fill="#f3f4f6"/>
  <text x="845" y="413" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Unknown</text>
  <text x="1000" y="412" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 4 -->
  <rect x="270" y="435" width="885" height="55" fill="white"/>
  <text x="295" y="467" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">frontend-app</text>
  <text x="430" y="467" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">staging-gke</text>
  <rect x="560" y="450" width="70" height="28" rx="4" fill="#d1fae5"/>
  <text x="595" y="468" fill="#065f46" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Staging</text>
  <text x="690" y="467" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Frontend Team</text>
  <rect x="810" y="450" width="50" height="28" rx="4" fill="#ffedd5"/>
  <text x="835" y="468" fill="#9a3412" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">High</text>
  <text x="1000" y="467" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>
  
  <!-- Row 5 -->
  <rect x="270" y="490" width="885" height="55" fill="#f8fafc"/>
  <text x="295" y="522" fill="#1e293b" font-family="system-ui, sans-serif" font-size="14" font-weight="600">data-pipeline</text>
  <text x="430" y="522" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">staging-gke</text>
  <rect x="560" y="505" width="70" height="28" rx="4" fill="#d1fae5"/>
  <text x="595" y="523" fill="#065f46" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Staging</text>
  <text x="690" y="522" fill="#1e293b" font-family="system-ui, sans-serif" font-size="13">Data Team</text>
  <rect x="810" y="505" width="70" height="28" rx="4" fill="#fef3c7"/>
  <text x="845" y="523" fill="#92400e" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Medium</text>
  <text x="1000" y="522" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">⋮</text>

  <!-- Pagination -->
  <text x="270" y="770" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Showing 5 of 156 namespaces</text>
  <text x="960" y="770" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">←  1  2  3  ...  32  →</text>
</svg>